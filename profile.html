<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Profile Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="box">

  <!-- SIDEBAR (UNCHANGED) -->
  <div class="nav">

    <h2 class="logo">PROFILE</h2>

    <ul>

      <li>
        <a href="index.html">
          <img src="PICS/home.jpg">
          <span>Home</span>
        </a>
      </li>

      <li>
        <a href="analytics.html">
          <img src="PICS/album.png">
          <span>Analytics</span>
        </a>
      </li>

      <li>
        <a href="reports.html">
          <img src="PICS/fav.png">
          <span>Reports</span>
        </a>
      </li>

      <li>
        <a href="settings.html">
          <img src="PICS/Profile">
          <span>Settings</span>
        </a>
      </li>

    </ul>

  </div>

  <!-- MAIN CONTENT -->
  <div class="content">

    <!-- TOP METRICS (REPLACED SECTION) -->
    <div class="top metrics-grid">

      <div class="metric">
        <h3>Visitors</h3>
        <h1 id="visitors">0</h1>
        <p>Live traffic</p>
      </div>

      <div class="metric">
        <h3>Projects</h3>
        <h1 id="projects">0</h1>
        <p>Completed builds</p>
      </div>

      <div class="metric">
        <h3>Followers</h3>
        <h1 id="followers">0</h1>
        <p>Social reach</p>
      </div>

      <div class="metric">
        <h3>Engagement</h3>
        <h1 id="engagement">0%</h1>
        <p>Activity rate</p>
      </div>

    </div>

    <!-- BIG CHART (REPLACEMENT FOR PLAYER AREA) -->
    <div class="bigbox chart-box">

      <div class="chart-header">
        <h2>Performance Overview</h2>
        <p>Realtime analytics</p>
      </div>

      <canvas id="chart"></canvas>

    </div>

  </div>

</div>

<script src="index.js"></script>

</body>
</html>
